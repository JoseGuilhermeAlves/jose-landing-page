  <!--
    Splash de carregamento em HTML/CSS puro (sem asset): terminal verde
    "ZEGUIDEV ARCADE" (mesmas letras do BootSequence em Flutter) sobre um piso
    Outrun em perspectiva + scanlines CRT — uma abertura continua. Pinta
    IMEDIATAMENTE (antes do engine --wasm /
    CanvasKit baixar) e some no evento `flutter-first-frame`. Sem isso, o
    usuário vê tela branca por 2-4s no primeiro acesso. Nada aqui é Flutter:
    antes do primeiro frame só roda HTML/CSS/JS estático.
  -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 42%, #160A2A 0%, #0A0612 62%);
      z-index: 9999;
      transition: opacity 320ms ease-out;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Piso "Outrun": grade em perspectiva recuando pro horizonte, rolando
       na direcao do observador. So CSS — nenhum asset. */
    #loading-grid {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 220%;
      height: 56%;
      transform: translateX(-50%) perspective(340px) rotateX(68deg);
      transform-origin: bottom center;
      background-image:
        linear-gradient(to right, rgba(255, 46, 151, 0.6) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 229, 255, 0.6) 1px, transparent 1px);
      background-size: 46px 46px;
      opacity: 0.20;
      animation: gridroll 1.6s linear infinite;
      -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 88%);
      mask-image: linear-gradient(to top, #000 0%, transparent 88%);
    }

    @keyframes gridroll {
      to { background-position-y: 46px; }
    }

    /* Scanlines CRT por cima de tudo (overlay sutil). */
    #loading::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.16) 3px
      );
    }

    /* Banda de varredura descendo lentamente. */
    #loading::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 40%;
      top: -40%;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(124, 107, 255, 0.10),
        transparent
      );
      animation: sweep 2.8s ease-in-out infinite;
    }

    @keyframes sweep {
      0% { top: -40%; }
      100% { top: 100%; }
    }

    #loading-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      width: min(460px, 84vw);
      padding: 0 24px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    /* Terminal verde digitado — casa com o BootSequence em Flutter que assume
       logo apos o primeiro frame (continuidade visual da abertura). */
    #loading-term {
      margin: 0;
      color: #39FF14;
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 1.5px;
      white-space: pre;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.45);
    }

    /* Cursor de terminal piscando. */
    #loading-caret {
      width: 12px;
      height: 20px;
      margin-top: 10px;
      background: #39FF14;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
      animation: blink 1.1s steps(1, end) infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #loading-grid,
      #loading::before,
      #loading-caret {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="loading" role="status" aria-live="polite" aria-label="Carregando ZeguiDev">
    <div id="loading-grid" aria-hidden="true"></div>
    <div id="loading-content">
      <pre id="loading-term">ZEGUIDEV  ARCADE
FLUTTER · 2026

LOADING...</pre>
      <div id="loading-caret" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    // Some assim que o Flutter sinalizar que o primeiro frame renderizou.
    // O hook `flutter-first-frame` e disparado pelo runtime.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(function () { el.remove(); }, 360);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
