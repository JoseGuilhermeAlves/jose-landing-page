<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- SEO -->
  <title>José Guilherme Alves — Flutter Developer (mobile, web, PWA)</title>
  <meta name="description" content="Desenvolvedor Flutter com 6 anos construindo apps mobile e web. Do MVP ao app em produção — Android, iOS, Web/PWA, integrações e consultoria técnica.">
  <meta name="author" content="José Guilherme Alves">
  <meta name="keywords" content="Flutter, Dart, desenvolvedor mobile, freelancer Flutter, app Android, PWA, Bloc, Clean Architecture, Brasil">
  <meta name="robots" content="index,follow">

  <!--
    Open Graph. TODO ao publicar:

    - trocar og:image / twitter:image por uma URL ABSOLUTA do hero
      (ex.: https://dominio/og-card.png), 1200x630 idealmente;

  <!-- iOS / PWA -->

  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Canonical: troque pelo dominio final ao publicar. -->
  <link rel="canonical" href="https://example.invalid/">

  <!--
    Splash de carregamento em HTML/CSS puro (sem asset): wordmark ZeguiDev
    sobre um piso Outrun em perspectiva + scanlines CRT, casando com a cena
    arcade que vai aparecer. Pinta IMEDIATAMENTE (antes do engine --wasm /
    CanvasKit baixar) e some no evento `flutter-first-frame`. Sem isso, o
    usuário vê tela branca por 2-4s no primeiro acesso. Nada aqui é Flutter:
    antes do primeiro frame só roda HTML/CSS/JS estático.
  -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 42%, #160A2A 0%, #0A0612 62%);
      z-index: 9999;
      transition: opacity 320ms ease-out;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Piso "Outrun": grade em perspectiva recuando pro horizonte, rolando
       na direcao do observador. So CSS — nenhum asset. */
    #loading-grid {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 220%;
      height: 56%;
      transform: translateX(-50%) perspective(340px) rotateX(68deg);
      transform-origin: bottom center;
      background-image:
        linear-gradient(to right, rgba(255, 46, 151, 0.6) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 229, 255, 0.6) 1px, transparent 1px);
      background-size: 46px 46px;
      opacity: 0.20;
      animation: gridroll 1.6s linear infinite;
      -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 88%);
      mask-image: linear-gradient(to top, #000 0%, transparent 88%);
    }

    @keyframes gridroll {
      to { background-position-y: 46px; }
    }

    /* Scanlines CRT por cima de tudo (overlay sutil). */
    #loading::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.16) 3px
      );
    }

    /* Banda de varredura descendo lentamente. */
    #loading::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 40%;
      top: -40%;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(124, 107, 255, 0.10),
        transparent
      );
      animation: sweep 2.8s ease-in-out infinite;
    }

    @keyframes sweep {
      0% { top: -40%; }
      100% { top: 100%; }
    }

    #loading-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #loading-wordmark {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #F2E9FF;
      text-shadow: 0 0 18px rgba(124, 107, 255, 0.35);
    }

    /* Sufixo "Dev" no gradiente da marca (magenta -> ciano). */
    #loading-wordmark span {
      background: linear-gradient(90deg, #FF2E97, #00E5FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #loading-text {
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #9A86C4;
      animation: blink 1.4s steps(1, end) infinite;
    }

    @keyframes blink {
      0%, 60% { opacity: 1; }
      61%, 100% { opacity: 0.35; }
    }

    @media (prefers-reduced-motion: reduce) {
      #loading-grid,
      #loading::before,
      #loading-text {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="loading" role="status" aria-live="polite" aria-label="Carregando ZeguiDev">
    <div id="loading-grid" aria-hidden="true"></div>
    <div id="loading-content">
      <div id="loading-wordmark">Zegui<span>Dev</span></div>
      <div id="loading-text">Carregando</div>
    </div>
  </div>

  <script>
    // Some assim que o Flutter sinalizar que o primeiro frame renderizou.
    // O hook `flutter-first-frame` e disparado pelo runtime.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(function () { el.remove(); }, 360);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
